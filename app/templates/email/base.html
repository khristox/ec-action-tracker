<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | {{ project_name }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #374151;
            background-color: #f3f4f6;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .email-wrapper {
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background: linear-gradient(135deg, {{ primary_color }} 0%, {{ primary_color_dark }} 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px 30px;
        }
        
        .footer {
            background-color: #f9fafb;
            padding: 20px 30px;
            text-align: center;
            font-size: 12px;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
        }
        
        .button {
            display: inline-block;
            background: linear-gradient(135deg, {{ primary_color }} 0%, {{ primary_color_dark }} 100%);
            color: white !important;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin: 20px 0;
            transition: transform 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
        }
        
        .meeting-details {
            background-color: #f9fafb;
            border-left: 4px solid {{ primary_color }};
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        
        .meeting-details h3 {
            color: {{ primary_color }};
            margin-bottom: 15px;
        }
        
        .detail-row {
            margin: 10px 0;
            display: flex;
            align-items: flex-start;
        }
        
        .detail-label {
            font-weight: 600;
            width: 100px;
            color: #4b5563;
        }
        
        .detail-value {
            flex: 1;
            color: #1f2937;
        }
        
        .info-box {
            background-color: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
        }
        
        .divider {
            height: 1px;
            background-color: #e5e7eb;
            margin: 20px 0;
        }
        
        @media only screen and (max-width: 600px) {
            .container {
                padding: 10px;
            }
            
            .content {
                padding: 25px 20px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .detail-row {
                flex-direction: column;
            }
            
            .detail-label {
                width: 100%;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="email-wrapper">
            <div class="header">
                <h1>{{ header_title }}</h1>
                <p>{{ header_subtitle }}</p>
            </div>
            
            <div class="content">
                {% block content %}{% endblock %}
            </div>
            
            <div class="footer">
                <p>&copy; {{ year }} {{ project_name }}. All rights reserved.</p>
                <p>This is an automated message, please do not reply.</p>
                <p style="margin-top: 10px;">
                    <a href="{{ frontend_url }}" style="color: {{ primary_color }}; text-decoration: none;">Visit our website</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
