<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Reset Link -  {{ project_name }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .error-icon {
            font-size: 64px;
            margin: 20px 0;
        }

        h2 {
            color: #d32f2f;
            margin-bottom: 20px;
        }

        .message {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>SWAHILLI</h1>
        </div>
        <div class="error-icon">🔒</div>
        <h2>Invalid or Expired Link</h2>
        <div class="message">
            {{ error }}
        </div>
        <a href="/api/v1/auth/forgot-password" class="button">Request New Reset Link</a>
        <div class="footer">
            <p><a href="/docs">Back to Home</a></p>
        </div>
    </div>
</body>
</html>
