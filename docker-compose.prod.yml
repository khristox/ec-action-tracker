version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ec_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: aradmin!2723646
      MYSQL_DATABASE: ecacttrack
      MYSQL_ROOT_HOST: '%'
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ec_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-paradmin!2723646"]
      timeout: 10s
      retries: 30
      interval: 5s
      start_period: 30s

  app:
    image: khristox/ec-action-tracker:latest
    container_name: ec_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "8005:8001"
    volumes:
      - ./static:/app/static  # Mount local static directory
      - ./logs:/app/logs
    networks:
      - ec_network

volumes:
  mysql_data:

networks:
  ec_network:
    driver: bridge