
services:
  mysql:
    image: mysql:8.0
    container_name: ec_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "aradmin!2723646"
      MYSQL_DATABASE: "ecacttrack"
      MYSQL_ROOT_HOST: "%"
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ec_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p'aradmin!2723646'"]
      timeout: 10s
      retries: 30
      interval: 5s
      start_period: 30s

  app:
    build:
      context: /home/chris/Chr/Apps/ECATMIS
      dockerfile: Dockerfile
    container_name: ec_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8006:8001"
    volumes:
      - ./logs:/app/logs
      - /home/chris/Chr/Apps/ECATMIS/static:/app/static
    networks:
      - ec_network
    environment:
      DATABASE_URL: "mysql+aiomysql://root:aradmin!2723646@mysql:3306/ecacttrack"
      SECRET_KEY: "anq7XxRv9Zado5dWbZSNmD2LOboeSKF1OpAN4g4TgTQ"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "120"
      REFRESH_TOKEN_SECRET_KEY: "XwgWnxCp9YpVJAYLrYICX7ia_mhcOm1RgStM63hHUKU"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "Admin123!"
      IN_DOCKER: "true"
      BACKEND_URL: "http://127.0.0.1:8006"
      API_BASE_URL: "http://127.0.0.1:8006"
      ENVIRONMENT: "production"
      DEBUG: "false"
      LOG_LEVEL: "INFO"
      FRONTEND_DIST_PATH: "/app/static"	

volumes:
  mysql_data:

networks:
  ec_network:
    driver: bridge
