version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ec_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: aradmin!2723646
      MYSQL_DATABASE: ecacttrack
      MYSQL_ROOT_HOST: '%'
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ec_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-paradmin!2723646"]
      timeout: 10s
      retries: 30
      interval: 5s
      start_period: 30s

  app:
    image: khristox/ec-action-tracker:latest
    container_name: ec_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    user: root
    environment:
      DATABASE_URL: mysql+aiomysql://root:aradmin!2723646@mysql:3306/ecacttrack
      SECRET_KEY: anq7XxRv9Zado5dWbZSNmD2LOboeSKF1OpAN4g4TgTQ
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      REFRESH_TOKEN_SECRET_KEY: XwgWnxCp9YpVJAYLrYICX7ia_mhcOm1RgStM63hHUKU
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin123!
      EMAIL_HOST: mail.eminence.co.ug
      EMAIL_PORT: 465
      EMAIL_USER: egra@eminence.co.ug
      EMAIL_PASSWORD: KxaXg3c*vyU$
      EMAIL_REJECT_UNAUTH: "false"
      EMAIL_USE_SSL: "true"
      EMAIL_USE_TLS: "false"
      EMAIL_FROM: egra@eminence.co.ug
      EMAIL_FROM_NAME: "Action Tracker"
      EMAIL_VERIFICATION_TOKEN_EXPIRE_HOURS: 24
      PASSWORD_RESET_TOKEN_EXPIRE_HOURS: 24
      PROJECT_TAGLINE: "Manage Your Properties Efficiently"
      PROJECT_NAME: "Action Tracker"
      VERSION: 1.0.0
      ENVIRONMENT: production
      DEBUG: "false"
      FRONTEND_DIST_PATH: /app/static
      ROOT_PATH: ""
      BASE_URL: /ec
      CORS_ORIGINS: '["https://eminence.co.ug","https://eminence.co.ug/ec","http://127.0.0.1:5173","http://127.0.0.1:8001","http://127.0.0.1:8006","http://localhost:3000"."http://localhost:8001","http://localhost:8006"]'
      LOG_LEVEL: INFO
      LOG_API_ACCESS: "true"
      LOG_ALL_API_ACCESS: "false"
      AUDIT_LOG_RETENTION_DAYS: 90
      IN_DOCKER: "true"
    ports:
      - "8006:8001"
    volumes:
      # Remove this line - it's overriding the static files
      # - ./static:/app/static
      - ./logs:/app/logs  # Keep logs volume
    networks:
      - ec_network
    command: >
      sh -c "
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8001
      "

volumes:
  mysql_data:

networks:
  ec_network:
    driver: bridge

